{% extends 'base.html' %}

{% block content %}

<style>

.thank-section{
    min-height:80vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
    linear-gradient(135deg,#90ebb9,#d0dbf3);
    padding:40px;
}





.thank-card{

    max-width:600px;
    width:100%;
    padding:50px 40px;

    background:rgba(255,255,255,0.15);

    backdrop-filter:blur(15px);

    border-radius:25px;

    border:1px solid rgba(153, 235, 210, 0.3);

    box-shadow:0 20px 40px rgba(0,0,0,0.2);

    color:rgb(5, 4, 4);

    animation:fadeIn 0.8s ease;

}


.success-icon{

    width:90px;
    height:90px;

    margin:auto;

    border-radius:50%;

    background:rgb(228, 217, 217);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:45px;

    color:#19963e;

    box-shadow:0 10px 25px rgba(0,0,0,0.2);

}


.thank-card h1{

    font-size:35px;

    margin-top:25px;

    font-weight:700;

}


.thank-card p{

    font-size:18px;

    opacity:0.9;

}


.shop-btn{

    padding:12px 35px;

    border-radius:30px;

    background:rgb(12, 10, 10);

    color:#e3dee7;

    font-weight:600;

    border:none;

    transition:0.3s;

}


.shop-btn:hover{

    transform:translateY(-3px);

    background:#61165d;

}


@keyframes fadeIn{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}


</style>



<section class="thank-section">


<div class="thank-card text-center">


<div class="success-icon">

✓

</div>



<h1>
 Order Confirmed!
</h1>


<p class="mt-3">

Thank you for shopping with us.

</p>


<p>

Your order has been placed successfully.  
We will process and deliver your order soon.

</p>



<a href="{% url 'store' %}" class="btn shop-btn mt-4">

Continue Shopping 🛒

</a>


</div>


</section>


{% endblock %}
