{% extends 'base.html' %}

{% block content %}

<style>

.reset-title{
    color:#8d3a8d;
    font-weight:700;
}


.lock-icon{
    width:70px;
    height:70px;
    background:#8d3a8d;
    color:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    font-size:30px;
}


.reset-btn{
    background:linear-gradient(135deg,#8d3a8d,#c06ac0);
    border:none;
    color:white;
    font-weight:600;
    transition:0.3s;
}


.reset-btn:hover{
    background:linear-gradient(135deg,#c06ac0,#8d3a8d);
    transform:translateY(-2px);
    color:white;
}


.form-control:focus{
    border-color:#8d3a8d;
    box-shadow:0 0 8px rgba(141,58,141,0.3);
}


</style>


<section class="section-conten padding-y" 
style="min-height:84vh; 
background:linear-gradient(135deg,#e3f2fd,#fce4ec); 
padding-top:70px;">


<div class="container">


    <div class="card mx-auto shadow-lg border-0" 
    style="max-width:420px; border-radius:20px;">


        <div class="card-body p-5">


            <div class="text-center mb-4">


                <div class="lock-icon">

                    <i class="fa fa-lock"></i>

                </div>


                <h3 class="mt-3 reset-title">
                    Reset Password
                </h3>


            </div>



            {% include 'includes/alerts.html' %}



            <form action="{% url 'resetPassword' %}" method="POST">

                {% csrf_token %}



                <div class="form-group mb-3">


                    <label class="font-weight-bold">
                        New Password
                    </label>


                    <input 
                    type="password" 
                    class="form-control"
                    placeholder="Create Password"
                    name="password"
                    required
                    style="height:45px;border-radius:10px;">


                </div>




                <div class="form-group mb-4">


                    <label class="font-weight-bold">
                        Confirm Password
                    </label>


                    <input 
                    type="password" 
                    class="form-control"
                    placeholder="Confirm Password"
                    name="confirm_password"
                    required
                    style="height:45px;border-radius:10px;">


                </div>




                <div class="form-group">


                    <button 
                    type="submit" 
                    class="btn reset-btn btn-block"
                    style="
                    height:45px;
                    border-radius:10px;
                    font-size:16px;">
                    
                    Reset Password
                    
                    </button>


                </div>


            </form>



        </div>


    </div>



    <p class="text-center mt-4">

        Don't have account?

        <a href="{% url 'register' %}" 
        style="font-weight:600; color:#8d3a8d;">
        
        Sign up
        
        </a>

    </p>



</div>


</section>


{% endblock %}
